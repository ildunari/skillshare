<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebGPU Compute Simulation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100dvh; overflow: hidden; font-family: system-ui; color: #ccc; }
  canvas { display: block; max-width: 100vw; max-height: 100dvh; touch-action: none; }
  #status { position: fixed; top: 12px; left: 12px; font-size: 12px; opacity: 0.6; }
  #fallback { padding: 2rem; text-align: center; max-width: 400px; }
  #fallback h2 { color: #f0a050; margin-bottom: 0.5rem; }
</style>
</head>
<body>
<div id="status"></div>
<canvas id="c"></canvas>

<script>
// ============================================================
// WebGPU Compute + Render Template
// ============================================================
// With automatic WebGL2 fallback detection.
//
// CUSTOMIZE:
// 1. COMPUTE_SHADER (WGSL) — your simulation logic
// 2. RENDER_VERTEX / RENDER_FRAGMENT (WGSL) — your visualization
// 3. Particle struct layout and initialization
//
// This template demonstrates a ping-pong compute particle system.
// Adapt for grid-based sims by using texture_storage_2d instead.

const PARTICLE_COUNT = 500000;
const WORKGROUP_SIZE = 256;

const canvas = document.getElementById('c');
const status = document.getElementById('status');

// ---- WGSL Shaders ----

const COMPUTE_SHADER = /* wgsl */`
struct Particle {
  pos: vec2f,
  vel: vec2f,
  life: f32,
  seed: f32,
  _pad0: f32,
  _pad1: f32,
};

struct Params {
  dt: f32,
  time: f32,
  count: u32,
  mouseX: f32,
  mouseY: f32,
  mouseDown: f32,
  width: f32,
  height: f32,
};

@group(0) @binding(0) var<storage, read> particlesIn: array<Particle>;
@group(0) @binding(1) var<storage, read_write> particlesOut: array<Particle>;
@group(0) @binding(2) var<uniform> params: Params;

fn hash(n: f32) -> f32 { return fract(sin(n) * 43758.5453); }

@compute @workgroup_size(${WORKGROUP_SIZE})
fn main(@builtin(global_invocation_id) id: vec3u) {
  let i = id.x;
  if (i >= params.count) { return; }

  var p = particlesIn[i];

  // === YOUR COMPUTE LOGIC HERE ===

  // Gravity
  p.vel.y -= 150.0 * params.dt;

  // Mouse attractor
  if (params.mouseDown > 0.5) {
    let target = vec2f(params.mouseX, params.mouseY);
    let toMouse = target - p.pos;
    let dist = max(length(toMouse), 5.0);
    p.vel += normalize(toMouse) * 8000.0 / dist * params.dt;
  }

  // Drag
  p.vel *= pow(0.985, params.dt * 60.0);

  // Integrate
  p.pos += p.vel * params.dt;
  p.life -= params.dt * 0.4;

  // Respawn
  if (p.life <= 0.0) {
    let s = p.seed;
    p.pos = vec2f(params.width * 0.5, params.height * 0.5)
          + vec2f(hash(s + params.time) - 0.5, hash(s * 2.0 + params.time) - 0.5) * 30.0;
    let angle = hash(s * 3.0 + params.time) * 6.2832;
    let speed = 30.0 + hash(s * 4.0 + params.time) * 120.0;
    p.vel = vec2f(cos(angle), sin(angle)) * speed;
    p.life = 0.5 + hash(s * 5.0 + params.time) * 2.0;
  }

  particlesOut[i] = p;
}
`;

const RENDER_VERTEX = /* wgsl */`
struct Particle {
  pos: vec2f,
  vel: vec2f,
  life: f32,
  seed: f32,
  _pad0: f32,
  _pad1: f32,
};

struct Params {
  width: f32,
  height: f32,
};

@group(0) @binding(0) var<storage, read> particles: array<Particle>;
@group(0) @binding(1) var<uniform> renderParams: Params;

struct VertexOutput {
  @builtin(position) pos: vec4f,
  @location(0) life: f32,
  @location(1) speed: f32,
};

// Quad vertices for instanced rendering
const QUAD = array<vec2f, 6>(
  vec2f(-1,-1), vec2f(1,-1), vec2f(-1,1),
  vec2f(-1,1),  vec2f(1,-1), vec2f(1,1),
);

@vertex
fn vs_main(@builtin(vertex_index) vi: u32, @builtin(instance_index) ii: u32) -> VertexOutput {
  let p = particles[ii];
  let size = mix(1.0, 3.0, p.life) / max(renderParams.width, renderParams.height);
  let offset = QUAD[vi] * size;
  let ndc = (p.pos / vec2f(renderParams.width, renderParams.height)) * 2.0 - 1.0;

  var out: VertexOutput;
  out.pos = vec4f(ndc + offset, 0.0, 1.0);
  out.life = p.life;
  out.speed = length(p.vel);
  return out;
}

@fragment
fn fs_main(in: VertexOutput) -> @location(0) vec4f {
  // === YOUR FRAGMENT COLOR HERE ===
  let warm = vec3f(1.0, 0.4, 0.1);
  let cool = vec3f(0.2, 0.5, 1.0);
  let color = mix(warm, cool, clamp(in.speed / 200.0, 0.0, 1.0));
  let alpha = in.life * 0.6;
  return vec4f(color * alpha, alpha);
}
`;

// ---- WebGPU Initialization ----

async function initWebGPU() {
  if (!navigator.gpu) return null;
  const adapter = await navigator.gpu.requestAdapter();
  if (!adapter) return null;
  const device = await adapter.requestDevice();
  return device;
}

async function main() {
  const device = await initWebGPU();

  if (!device) {
    // FALLBACK: No WebGPU available
    status.textContent = 'WebGPU not available — falling back';
    showFallback();
    return;
  }

  status.textContent = `WebGPU active — ${PARTICLE_COUNT.toLocaleString()} particles`;

  // Canvas setup
  const dpr = Math.min(window.devicePixelRatio, 2);
  function resize() {
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
  }
  resize();
  window.addEventListener('resize', resize);

  const ctx = canvas.getContext('webgpu');
  const format = navigator.gpu.getPreferredCanvasFormat();
  ctx.configure({ device, format, alphaMode: 'premultiplied' });

  // ---- Particle data ----
  const FLOATS_PER = 8; // must match struct Particle (padded to 32 bytes)
  const data = new Float32Array(PARTICLE_COUNT * FLOATS_PER);
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    const b = i * FLOATS_PER;
    data[b + 0] = Math.random() * canvas.width;   // pos.x
    data[b + 1] = Math.random() * canvas.height;  // pos.y
    const a = Math.random() * Math.PI * 2;
    const s = 20 + Math.random() * 80;
    data[b + 2] = Math.cos(a) * s;  // vel.x
    data[b + 3] = Math.sin(a) * s;  // vel.y
    data[b + 4] = Math.random() * 2; // life
    data[b + 5] = i;                  // seed
  }

  const bufSize = data.byteLength;
  const bufA = device.createBuffer({ size: bufSize, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST });
  const bufB = device.createBuffer({ size: bufSize, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST });
  device.queue.writeBuffer(bufA, 0, data);
  device.queue.writeBuffer(bufB, 0, data);

  // Uniform buffers
  const computeParamsBuf = device.createBuffer({ size: 32, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });
  const renderParamsBuf = device.createBuffer({ size: 8, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });

  // ---- Compute pipeline ----
  const computeModule = device.createShaderModule({ code: COMPUTE_SHADER });
  const computeBGL = device.createBindGroupLayout({
    entries: [
      { binding: 0, visibility: GPUShaderStage.COMPUTE, buffer: { type: 'read-only-storage' } },
      { binding: 1, visibility: GPUShaderStage.COMPUTE, buffer: { type: 'storage' } },
      { binding: 2, visibility: GPUShaderStage.COMPUTE, buffer: { type: 'uniform' } },
    ],
  });
  const computePipeline = device.createComputePipeline({
    layout: device.createPipelineLayout({ bindGroupLayouts: [computeBGL] }),
    compute: { module: computeModule, entryPoint: 'main' },
  });

  // Two bind groups for ping-pong
  const computeBG_AtoB = device.createBindGroup({ layout: computeBGL, entries: [
    { binding: 0, resource: { buffer: bufA } },
    { binding: 1, resource: { buffer: bufB } },
    { binding: 2, resource: { buffer: computeParamsBuf } },
  ]});
  const computeBG_BtoA = device.createBindGroup({ layout: computeBGL, entries: [
    { binding: 0, resource: { buffer: bufB } },
    { binding: 1, resource: { buffer: bufA } },
    { binding: 2, resource: { buffer: computeParamsBuf } },
  ]});

  // ---- Render pipeline ----
  const renderModule = device.createShaderModule({ code: RENDER_VERTEX });
  const renderBGL = device.createBindGroupLayout({
    entries: [
      { binding: 0, visibility: GPUShaderStage.VERTEX, buffer: { type: 'read-only-storage' } },
      { binding: 1, visibility: GPUShaderStage.VERTEX, buffer: { type: 'uniform' } },
    ],
  });
  const renderPipeline = device.createRenderPipeline({
    layout: device.createPipelineLayout({ bindGroupLayouts: [renderBGL] }),
    vertex: { module: renderModule, entryPoint: 'vs_main' },
    fragment: {
      module: renderModule, entryPoint: 'fs_main',
      targets: [{ format, blend: {
        color: { srcFactor: 'src-alpha', dstFactor: 'one', operation: 'add' },
        alpha: { srcFactor: 'one', dstFactor: 'one', operation: 'add' },
      }}],
    },
    primitive: { topology: 'triangle-list' },
  });

  const renderBG_A = device.createBindGroup({ layout: renderBGL, entries: [
    { binding: 0, resource: { buffer: bufB } }, // read from B after A→B compute
    { binding: 1, resource: { buffer: renderParamsBuf } },
  ]});
  const renderBG_B = device.createBindGroup({ layout: renderBGL, entries: [
    { binding: 0, resource: { buffer: bufA } }, // read from A after B→A compute
    { binding: 1, resource: { buffer: renderParamsBuf } },
  ]});

  // ---- Mouse ----
  let mouse = [0.5, 0.5], mouseDown = 0;
  canvas.addEventListener('pointermove', e => {
    const rect = canvas.getBoundingClientRect();
    mouse = [
      ((e.clientX - rect.left) / rect.width) * canvas.width,
      (1.0 - (e.clientY - rect.top) / rect.height) * canvas.height,
    ];
  });
  canvas.addEventListener('pointerdown', e => { mouseDown = 1; canvas.setPointerCapture(e.pointerId); });
  canvas.addEventListener('pointerup', () => { mouseDown = 0; });

  // ---- Frame loop ----
  let last = performance.now() / 1000;
  const startTime = last;
  let pingpong = 0; // 0: A→B, 1: B→A

  function frame(nowMs) {
    const now = nowMs / 1000;
    const dt = Math.min(now - last, 0.05);
    last = now;

    // Update compute params
    const cp = new Float32Array([dt, now - startTime, 0, mouse[0], mouse[1], mouseDown, canvas.width, canvas.height]);
    new Uint32Array(cp.buffer)[2] = PARTICLE_COUNT; // u32 count
    device.queue.writeBuffer(computeParamsBuf, 0, cp);

    // Update render params
    device.queue.writeBuffer(renderParamsBuf, 0, new Float32Array([canvas.width, canvas.height]));

    const encoder = device.createCommandEncoder();

    // Compute pass
    const computePass = encoder.beginComputePass();
    computePass.setPipeline(computePipeline);
    computePass.setBindGroup(0, pingpong === 0 ? computeBG_AtoB : computeBG_BtoA);
    computePass.dispatchWorkgroups(Math.ceil(PARTICLE_COUNT / WORKGROUP_SIZE));
    computePass.end();

    // Render pass
    const renderPass = encoder.beginRenderPass({
      colorAttachments: [{
        view: ctx.getCurrentTexture().createView(),
        loadOp: 'clear', clearValue: { r: 0.02, g: 0.02, b: 0.03, a: 1 },
        storeOp: 'store',
      }],
    });
    renderPass.setPipeline(renderPipeline);
    renderPass.setBindGroup(0, pingpong === 0 ? renderBG_A : renderBG_B);
    renderPass.draw(6, PARTICLE_COUNT); // 6 verts per quad, instanced
    renderPass.end();

    device.queue.submit([encoder.finish()]);
    pingpong = 1 - pingpong;

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

function showFallback() {
  canvas.remove();
  const div = document.createElement('div');
  div.id = 'fallback';
  div.innerHTML = `
    <h2>WebGPU Not Available</h2>
    <p>This simulation requires WebGPU (Chrome 113+, Firefox 141+, Safari 26+).</p>
    <p>Replace this with your WebGL2 fallback implementation, or use the
    <code>simulation-base.html</code> or <code>particle-base.html</code> templates instead.</p>
  `;
  document.body.appendChild(div);
}

main().catch(err => { console.error(err); status.textContent = 'Error: ' + err.message; });
</script>
</body>
</html>
