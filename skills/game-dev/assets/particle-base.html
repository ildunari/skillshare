<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Particle System</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; display: flex; justify-content: center; align-items: center; min-height: 100dvh; overflow: hidden; }
  canvas { display: block; width: 100vw; height: 100dvh; touch-action: none; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<!-- UPDATE VERTEX SHADER — runs via Transform Feedback, outputs new particle state -->
<script id="vs-update" type="x-shader/x-vertex">#version 300 es
// Input: current particle state
in vec4 a_posLife;    // xy = position, z = unused, w = life (0-1)
in vec4 a_velSeed;    // xy = velocity, z = unused, w = seed (for randomness)

// Output: updated state (captured by Transform Feedback)
out vec4 v_posLife;
out vec4 v_velSeed;

uniform float u_dt;
uniform vec2 u_resolution;
uniform vec2 u_mouse;
uniform float u_mouseDown;
uniform float u_time;

// Simple hash for pseudo-random respawn
float hash(float n) { return fract(sin(n) * 43758.5453); }

void main() {
  vec2 pos = a_posLife.xy;
  float life = a_posLife.w;
  vec2 vel = a_velSeed.xy;
  float seed = a_velSeed.w;

  // === YOUR PARTICLE PHYSICS HERE ===

  // Gravity
  vel.y -= 200.0 * u_dt;

  // Mouse attractor (when pressed)
  if (u_mouseDown > 0.5) {
    vec2 toMouse = u_mouse * u_resolution - pos;
    float dist = max(length(toMouse), 10.0);
    vel += normalize(toMouse) * 5000.0 / dist * u_dt;
  }

  // Drag
  vel *= pow(0.98, u_dt * 60.0);

  // Integrate
  pos += vel * u_dt;
  life -= u_dt * 0.5; // die over ~2 seconds

  // Respawn dead particles
  if (life <= 0.0) {
    float id = seed;
    pos = u_resolution * 0.5 + vec2(hash(id + u_time) - 0.5, hash(id * 2.0 + u_time) - 0.5) * 40.0;
    float angle = hash(id * 3.0 + u_time) * 6.2832;
    float speed = 50.0 + hash(id * 4.0 + u_time) * 150.0;
    vel = vec2(cos(angle), sin(angle)) * speed;
    life = 0.5 + hash(id * 5.0 + u_time) * 1.5;
  }

  v_posLife = vec4(pos, 0.0, life);
  v_velSeed = vec4(vel, 0.0, seed);
}
</script>

<!-- Dummy fragment for update pass (Transform Feedback doesn't use it, but WebGL requires one) -->
<script id="fs-update" type="x-shader/x-fragment">#version 300 es
precision lowp float;
out vec4 fragColor;
void main() { fragColor = vec4(0.0); }
</script>

<!-- RENDER VERTEX SHADER — positions and sizes the points -->
<script id="vs-render" type="x-shader/x-vertex">#version 300 es
in vec4 a_posLife;
in vec4 a_velSeed;
uniform vec2 u_resolution;
out float v_life;
out float v_speed;

void main() {
  vec2 ndc = (a_posLife.xy / u_resolution) * 2.0 - 1.0;
  gl_Position = vec4(ndc, 0.0, 1.0);
  gl_PointSize = mix(1.0, 4.0, a_posLife.w); // size by life
  v_life = a_posLife.w;
  v_speed = length(a_velSeed.xy);
}
</script>

<!-- RENDER FRAGMENT SHADER — customize particle appearance -->
<script id="fs-render" type="x-shader/x-fragment">#version 300 es
precision highp float;
in float v_life;
in float v_speed;
out vec4 fragColor;

void main() {
  // Soft circle
  vec2 pc = gl_PointCoord * 2.0 - 1.0;
  float d = dot(pc, pc);
  if (d > 1.0) discard;
  float alpha = (1.0 - d) * v_life;

  // === YOUR PARTICLE COLOR HERE ===
  // Color by speed: slow = warm, fast = cool
  vec3 color = mix(vec3(1.0, 0.4, 0.1), vec3(0.2, 0.6, 1.0), clamp(v_speed / 300.0, 0.0, 1.0));

  fragColor = vec4(color * alpha, alpha);
}
</script>

<script>
// ============================================================
// WebGL2 Transform Feedback Particle System Template
// ============================================================
// Customize: vs-update (particle physics), fs-render (particle visuals)
// Particles update entirely on GPU. No CPU particle loop needed.

const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2', { alpha: false, premultipliedAlpha: false });
if (!gl) { document.body.textContent = 'WebGL2 required'; throw new Error('No WebGL2'); }

// --- Configuration ---
const PARTICLE_COUNT = 100000;

// --- Canvas sizing ---
let W, H;
function resize() {
  const dpr = Math.min(window.devicePixelRatio, 2);
  W = canvas.width = window.innerWidth * dpr;
  H = canvas.height = window.innerHeight * dpr;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
}
resize();
window.addEventListener('resize', resize);

// --- Shader compilation ---
function compileShader(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) throw new Error(gl.getShaderInfoLog(s));
  return s;
}

function createTFProgram(vsId, fsId, varyings) {
  const p = gl.createProgram();
  gl.attachShader(p, compileShader(gl.VERTEX_SHADER, document.getElementById(vsId).textContent));
  gl.attachShader(p, compileShader(gl.FRAGMENT_SHADER, document.getElementById(fsId).textContent));
  gl.transformFeedbackVaryings(p, varyings, gl.INTERLEAVED_ATTRIBS);
  gl.linkProgram(p);
  if (!gl.getProgramParameter(p, gl.LINK_STATUS)) throw new Error(gl.getProgramInfoLog(p));
  return p;
}

function createRenderProgram(vsId, fsId) {
  const p = gl.createProgram();
  gl.attachShader(p, compileShader(gl.VERTEX_SHADER, document.getElementById(vsId).textContent));
  gl.attachShader(p, compileShader(gl.FRAGMENT_SHADER, document.getElementById(fsId).textContent));
  gl.linkProgram(p);
  if (!gl.getProgramParameter(p, gl.LINK_STATUS)) throw new Error(gl.getProgramInfoLog(p));
  return p;
}

// Programs
const updateProg = createTFProgram('vs-update', 'fs-update', ['v_posLife', 'v_velSeed']);
const renderProg = createRenderProgram('vs-render', 'fs-render');

// --- Initial particle data ---
const FLOATS_PER_PARTICLE = 8; // posLife(4) + velSeed(4)
const data = new Float32Array(PARTICLE_COUNT * FLOATS_PER_PARTICLE);
for (let i = 0; i < PARTICLE_COUNT; i++) {
  const base = i * FLOATS_PER_PARTICLE;
  data[base + 0] = Math.random() * 800;  // x
  data[base + 1] = Math.random() * 600;  // y
  data[base + 2] = 0;                     // z (unused)
  data[base + 3] = Math.random() * 2.0;  // life
  const angle = Math.random() * Math.PI * 2;
  const speed = 20 + Math.random() * 100;
  data[base + 4] = Math.cos(angle) * speed; // vx
  data[base + 5] = Math.sin(angle) * speed; // vy
  data[base + 6] = 0;                        // z (unused)
  data[base + 7] = i;                        // seed
}

// --- Double-buffered VBOs ---
function createVAO(buf, prog) {
  const vao = gl.createVertexArray();
  gl.bindVertexArray(vao);
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  const posLifeLoc = gl.getAttribLocation(prog, 'a_posLife');
  const velSeedLoc = gl.getAttribLocation(prog, 'a_velSeed');
  const stride = FLOATS_PER_PARTICLE * 4;
  if (posLifeLoc >= 0) { gl.enableVertexAttribArray(posLifeLoc); gl.vertexAttribPointer(posLifeLoc, 4, gl.FLOAT, false, stride, 0); }
  if (velSeedLoc >= 0) { gl.enableVertexAttribArray(velSeedLoc); gl.vertexAttribPointer(velSeedLoc, 4, gl.FLOAT, false, stride, 16); }
  return vao;
}

const bufA = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, bufA);
gl.bufferData(gl.ARRAY_BUFFER, data, gl.DYNAMIC_COPY);

const bufB = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, bufB);
gl.bufferData(gl.ARRAY_BUFFER, data.byteLength, gl.DYNAMIC_COPY);

const updateVaoA = createVAO(bufA, updateProg);
const updateVaoB = createVAO(bufB, updateProg);
const renderVaoA = createVAO(bufA, renderProg);
const renderVaoB = createVAO(bufB, renderProg);

const tf = gl.createTransformFeedback();

// Ping-pong state
let current = {
  updateVao: updateVaoA, renderVao: renderVaoA, srcBuf: bufA,
  dstUpdateVao: updateVaoB, dstRenderVao: renderVaoB, dstBuf: bufB,
};

// --- Uniforms ---
const updateUniforms = {
  dt: gl.getUniformLocation(updateProg, 'u_dt'),
  resolution: gl.getUniformLocation(updateProg, 'u_resolution'),
  mouse: gl.getUniformLocation(updateProg, 'u_mouse'),
  mouseDown: gl.getUniformLocation(updateProg, 'u_mouseDown'),
  time: gl.getUniformLocation(updateProg, 'u_time'),
};
const renderUniforms = {
  resolution: gl.getUniformLocation(renderProg, 'u_resolution'),
};

// --- Mouse ---
let mouse = [0.5, 0.5], mouseDown = 0;
canvas.addEventListener('pointermove', e => {
  const rect = canvas.getBoundingClientRect();
  const dpr = Math.min(window.devicePixelRatio, 2);
  mouse = [(e.clientX - rect.left) / rect.width, 1.0 - (e.clientY - rect.top) / rect.height];
});
canvas.addEventListener('pointerdown', e => { mouseDown = 1; canvas.setPointerCapture(e.pointerId); });
canvas.addEventListener('pointerup', () => { mouseDown = 0; });

// --- Render loop ---
let last = performance.now() / 1000;
const startTime = last;

function frame(nowMs) {
  const now = nowMs / 1000;
  const dt = Math.min(now - last, 0.05);
  last = now;

  // UPDATE PASS (Transform Feedback)
  gl.useProgram(updateProg);
  gl.uniform1f(updateUniforms.dt, dt);
  gl.uniform2f(updateUniforms.resolution, W, H);
  gl.uniform2fv(updateUniforms.mouse, mouse);
  gl.uniform1f(updateUniforms.mouseDown, mouseDown);
  gl.uniform1f(updateUniforms.time, now - startTime);

  gl.bindVertexArray(current.updateVao);
  gl.bindTransformFeedback(gl.TRANSFORM_FEEDBACK, tf);
  gl.bindBufferBase(gl.TRANSFORM_FEEDBACK_BUFFER, 0, current.dstBuf);
  gl.enable(gl.RASTERIZER_DISCARD); // no fragment processing needed
  gl.beginTransformFeedback(gl.POINTS);
  gl.drawArrays(gl.POINTS, 0, PARTICLE_COUNT);
  gl.endTransformFeedback();
  gl.disable(gl.RASTERIZER_DISCARD);
  gl.bindTransformFeedback(gl.TRANSFORM_FEEDBACK, null);

  // RENDER PASS
  gl.viewport(0, 0, W, H);
  gl.clearColor(0.02, 0.02, 0.03, 1.0);
  gl.clear(gl.COLOR_BUFFER_BIT);
  gl.enable(gl.BLEND);
  gl.blendFunc(gl.SRC_ALPHA, gl.ONE); // Additive blending

  gl.useProgram(renderProg);
  gl.uniform2f(renderUniforms.resolution, W, H);
  gl.bindVertexArray(current.dstRenderVao);
  gl.drawArrays(gl.POINTS, 0, PARTICLE_COUNT);

  gl.disable(gl.BLEND);

  // SWAP
  current = {
    updateVao: current.dstUpdateVao, renderVao: current.dstRenderVao, srcBuf: current.dstBuf,
    dstUpdateVao: current.updateVao, dstRenderVao: current.renderVao, dstBuf: current.srcBuf,
  };

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
