<!DOCTYPE html>
<!--
  LIQUID GLASS — Standalone HTML Template
  Zero dependencies. Copy-paste ready.
  Sources:
    https://codepen.io/wprod/pen/raVpwJL
    https://codepen.io/samarkandiy/pen/MYwQwZZ
    https://dev.to/fabiosleal/how-to-create-the-apple-liquid-glass-effect-with-css-and-svg-2o06
-->
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Liquid Glass UI</title>
  <style>
    /* ===== CSS TOKENS ===== */
    :root {
      --glass-bg:        rgba(255, 255, 255, 0.22);
      --glass-highlight: rgba(255, 255, 255, 0.72);
      --glass-text:      #ffffff;
      --glass-muted:     rgba(255,255,255,0.55);
      --glass-accent:    #fb4268;
      --glass-radius:    2rem;
      --glass-shadow:    0 6px 6px rgba(0,0,0,0.22), 0 0 22px rgba(0,0,0,0.12);
    }

    /* ===== RESET ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ===== BACKGROUND ===== */
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 2rem;
      background: url("https://images.unsplash.com/photo-1551384963-cccb0b7ed94b?q=80&w=2000&auto=format&fit=crop") center/cover fixed;
      animation: bg-drift 6s ease-in-out infinite alternate;
    }
    @keyframes bg-drift {
      from { background-position: center center; }
      to   { background-position: center top; }
    }
    @media (prefers-reduced-motion: reduce) {
      body, .glass, .glass * { animation: none !important; transition: none !important; }
    }

    /* ===== GLASS CONTAINER ===== */
    .glass {
      position: relative;
      border-radius: var(--glass-radius);
      overflow: hidden;
      box-shadow: var(--glass-shadow);
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 2.2),
                  box-shadow 0.4s ease;
    }
    .glass:hover {
      transform: scale(1.03);
      box-shadow: 0 12px 28px rgba(0,0,0,0.32), 0 0 40px rgba(0,0,0,0.18);
    }
    .glass:active { transform: scale(0.97); }

    /* ===== INNER LAYERS ===== */
    .glass__filter,
    .glass__tint,
    .glass__specular {
      position: absolute;
      inset: 0;
      border-radius: inherit;
      pointer-events: none;
    }
    /* Layer 0: distortion + blur */
    .glass__filter {
      z-index: 0;
      backdrop-filter: blur(4px);
      filter: url(#glass-filter) saturate(120%) brightness(1.15);
      isolation: isolate;
    }
    /* Layer 1: tint */
    .glass__tint {
      z-index: 1;
      background: var(--glass-bg);
    }
    /* Layer 2: specular rim */
    .glass__specular {
      z-index: 2;
      overflow: hidden;
      box-shadow:
        inset 1px 1px 0 var(--glass-highlight),
        inset 0 0 6px var(--glass-highlight);
    }
    /* Layer 3: content */
    .glass__content {
      position: relative;
      z-index: 3;
      color: var(--glass-text);
    }

    /* ===== LAYOUT VARIANTS ===== */
    .glass--card   { min-width: 22rem; }
    .glass--pill   { border-radius: 9999px; }
    .glass--sm     { border-radius: 1rem; }

    /* ===== COMPONENTS ===== */
    /* Music Player */
    .player {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1.5rem;
      gap: 1.25rem;
    }
    .player__art {
      width: 56px;
      height: 56px;
      border-radius: 0.5rem;
      object-fit: cover;
    }
    .player__meta { flex: 1; }
    .player__title  { font-size: 0.95rem; font-weight: 600; }
    .player__artist { font-size: 0.85rem; opacity: 0.55; margin-top: 2px; }
    .player__controls {
      display: flex;
      gap: 1rem;
      align-items: center;
    }
    .player__btn {
      background: none;
      border: none;
      cursor: pointer;
      fill: white;
      opacity: 0.85;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }
    .player__btn:hover  { opacity: 1; transform: scale(1.15); }
    .player__btn:active { transform: scale(0.9); }

    /* Nav / Dock */
    .dock {
      display: flex;
      align-items: center;
      padding: 0.6rem 1.5rem;
      gap: 2rem;
    }
    .dock__item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      font-size: 0.7rem;
      color: var(--glass-muted);
      cursor: pointer;
      transition: color 0.2s ease;
    }
    .dock__item svg {
      fill: currentColor;
      transition: transform 0.2s ease;
    }
    .dock__item:hover  { color: white; }
    .dock__item:hover svg  { transform: scale(1.15); }
    .dock__item:active svg { transform: scale(0.92); }
    .dock__item--active { color: var(--glass-accent); }

    /* Card with title + body */
    .card-body { padding: 1.25rem 1.5rem; }
    .card-body h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.5rem; }
    .card-body p  { font-size: 0.9rem; opacity: 0.7; line-height: 1.5; }

    /* Pill button */
    .glass-btn {
      cursor: pointer;
      transition: transform 0.2s ease;
    }
    .glass-btn .glass__content {
      padding: 0.6rem 1.8rem;
      font-size: 0.9rem;
      font-weight: 600;
      white-space: nowrap;
    }

    /* Icon dock row */
    .icon-dock {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.75rem 1.5rem;
      gap: 1rem;
    }
    .icon-dock__icon {
      width: 60px;
      transition: transform 0.25s cubic-bezier(0.175,0.885,0.32,2.2);
      cursor: pointer;
    }
    .icon-dock__icon:hover  { transform: scale(1.15) translateY(-4px); }
    .icon-dock__icon:active { transform: scale(0.95); }
  </style>
</head>
<body>

  <!-- SVG Filter Definitions — place once per page -->
  <svg style="display:none" xmlns="http://www.w3.org/2000/svg">
    <!-- Filter A: Fractal Noise Distortion -->
    <filter id="glass-filter" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.008 0.008"
        numOctaves="2" seed="92" result="noise"/>
      <feGaussianBlur in="noise" stdDeviation="2" result="blurred"/>
      <feDisplacementMap in="SourceGraphic" in2="blurred"
        scale="70" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <!-- Filter B: Alpha Lens Warp (for icon dock) -->
    <filter id="lens-filter" x="0%" y="0%" width="100%" height="100%"
            filterUnits="objectBoundingBox">
      <feComponentTransfer in="SourceAlpha" result="alpha">
        <feFuncA type="identity"/>
      </feComponentTransfer>
      <feGaussianBlur in="alpha" stdDeviation="50" result="blur"/>
      <feDisplacementMap in="SourceGraphic" in2="blur"
        scale="50" xChannelSelector="A" yChannelSelector="A"/>
    </filter>
    <!-- Filter C: Animated fluid (seed animation) -->
    <filter id="animated-filter" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.01 0.01"
        numOctaves="1" seed="5" result="turbulence">
        <animate attributeName="seed" from="1" to="200" dur="8s" repeatCount="indefinite"/>
      </feTurbulence>
      <feGaussianBlur in="turbulence" stdDeviation="3" result="softMap"/>
      <feDisplacementMap in="SourceGraphic" in2="softMap"
        scale="120" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </svg>

  <!-- === EXAMPLE 1: Music Player Card === -->
  <div class="glass glass--card" style="min-width:28rem;">
    <div class="glass__filter"></div>
    <div class="glass__tint"></div>
    <div class="glass__specular"></div>
    <div class="glass__content">
      <div class="player">
        <img class="player__art"
          src="https://images.unsplash.com/photo-1619983081593-e2ba5b543168?w=200&q=80" alt="Album Art"/>
        <div class="player__meta">
          <div class="player__title">All Of Me</div>
          <div class="player__artist">Nao</div>
        </div>
        <div class="player__controls">
          <!-- Rewind -->
          <button class="player__btn" title="Previous">
            <svg width="18" height="18" viewBox="0 0 448 512">
              <path d="M223.7 239l136-136c9.4-9.4 24.6-9.4 33.9 0l22.6 22.6c9.4 9.4 9.4 24.6 0 33.9L295.9 256l120.3 120c9.4 9.4 9.4 24.6 0 33.9L393.6 433c-9.4 9.4-24.6 9.4-33.9 0l-136-136c-9.4-9.4-9.4-24.6 0-33.9zm-192 0l136-136c9.4-9.4 24.6-9.4 33.9 0l22.6 22.6c9.4 9.4 9.4 24.6 0 33.9L103.9 256l120.3 120c9.4 9.4 9.4 24.6 0 33.9L201.6 433c-9.4 9.4-24.6 9.4-33.9 0l-136-136c-9.4-9.4-9.4-24.6 0-33.9z"/>
            </svg>
          </button>
          <!-- Play -->
          <button class="player__btn" title="Play">
            <svg width="22" height="22" viewBox="0 0 448 512">
              <path d="M424.4 214.7L72.4 6.6C43.8-10.3 0 6.1 0 47.9V464c0 37.5 40.7 60.1 72.4 41.3l352-208c31.4-18.5 31.5-64.1 0-82.6z"/>
            </svg>
          </button>
          <!-- Forward -->
          <button class="player__btn" title="Next">
            <svg width="18" height="18" viewBox="0 0 448 512">
              <path d="M224.3 273l-136 136c-9.4 9.4-24.6 9.4-33.9 0l-22.6-22.6c-9.4-9.4-9.4-24.6 0-33.9l120.3-120L31.8 112c-9.4-9.4-9.4-24.6 0-33.9L54.4 56c9.4-9.4 24.6-9.4 33.9 0l136 136c9.4 9.4 9.4 24.6 0 33.9zm192 0l-136 136c-9.4 9.4-24.6 9.4-33.9 0l-22.6-22.6c-9.4-9.4-9.4-24.6 0-33.9l120.3-120L224 112c-9.4-9.4-9.4-24.6 0-33.9l22.6-22.6c9.4-9.4 24.6-9.4 33.9 0l136 136c9.4 9.4 9.4 24.6 0 33.9z"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- === EXAMPLE 2: Nav Dock Bar === -->
  <div class="glass glass--pill">
    <div class="glass__filter"></div>
    <div class="glass__tint"></div>
    <div class="glass__specular"></div>
    <div class="glass__content">
      <nav class="dock">
        <div class="dock__item dock__item--active">
          <svg width="24" height="24" viewBox="0 0 576 512">
            <path d="M280.37 148.26L96 300.11V464a16 16 0 0 0 16 16l112.06-.29a16 16 0 0 0 15.92-16V368a16 16 0 0 1 16-16h64a16 16 0 0 1 16 16v95.64a16 16 0 0 0 16 16.05L464 480a16 16 0 0 0 16-16V300L295.67 148.26a12.19 12.19 0 0 0-15.3 0z"/>
          </svg>
          Home
        </div>
        <div class="dock__item">
          <svg width="24" height="24" viewBox="0 0 512 512">
            <path d="M505 442.7L405.3 343c-4.5-4.5-10.6-7-17-7H372c27.6-35.3 44-79.7 44-128C416 93.1 322.9 0 208 0S0 93.1 0 208s93.1 208 208 208c48.3 0 92.7-16.4 128-44v16.3c0 6.4 2.5 12.5 7 17l99.7 99.7c9.4 9.4 24.6 9.4 33.9 0l28.3-28.3c9.4-9.4 9.4-24.6.1-34zM208 336c-70.7 0-128-57.2-128-128 0-70.7 57.2-128 128-128 70.7 0 128 57.2 128 128 0 70.7-57.2 128-128 128z"/>
          </svg>
          Search
        </div>
        <div class="dock__item">
          <svg width="24" height="24" viewBox="0 0 512 512">
            <path d="M470.38 1.51L150.41 96A32 32 0 0 0 128 126.51v261.41A139 139 0 0 0 96 384c-53 0-96 28.66-96 64s43 64 96 64 96-28.66 96-64V214.32l256-75v184.61a138.4 138.4 0 0 0-32-3.93c-53 0-96 28.66-96 64s43 64 96 64 96-28.65 96-64V32a32 32 0 0 0-41.62-30.49z"/>
          </svg>
          Library
        </div>
        <div class="dock__item">
          <svg width="24" height="24" viewBox="0 0 512 512">
            <path d="M12.41 148.02l232.94 105.67c6.8 3.09 14.49 3.09 21.29 0l232.94-105.67c16.55-7.51 16.55-32.52 0-40.03L266.65 2.31a25.607 25.607 0 0 0-21.29 0L12.41 107.98c-16.55 7.51-16.55 32.53 0 40.04z"/>
          </svg>
          Browse
        </div>
      </nav>
    </div>
  </div>

  <!-- === EXAMPLE 3: Info Card === -->
  <div class="glass" style="max-width:24rem;">
    <div class="glass__filter" style="filter: url(#animated-filter) saturate(130%) brightness(1.1)"></div>
    <div class="glass__tint"></div>
    <div class="glass__specular"></div>
    <div class="glass__content">
      <div class="card-body">
        <h2>Liquid Glass MCP</h2>
        <p>Apple-inspired translucent UI using CSS backdrop-filter and SVG displacement maps. Drop this pattern into any MCP app panel.</p>
      </div>
    </div>
  </div>

  <!-- === EXAMPLE 4: Pill Buttons === -->
  <div style="display:flex; gap:1rem; flex-wrap:wrap; justify-content:center;">
    <div class="glass glass--pill glass-btn" onclick="alert('Primary clicked')">
      <div class="glass__filter"></div>
      <div class="glass__tint"></div>
      <div class="glass__specular"></div>
      <div class="glass__content">
        <div style="padding:0.55rem 1.6rem; font-weight:600; font-size:0.9rem;">Get Started</div>
      </div>
    </div>
    <div class="glass glass--pill glass-btn" onclick="alert('Secondary clicked')"
      style="--glass-bg: rgba(255,255,255,0.1);">
      <div class="glass__filter"></div>
      <div class="glass__tint"></div>
      <div class="glass__specular"></div>
      <div class="glass__content">
        <div style="padding:0.55rem 1.6rem; font-weight:600; font-size:0.9rem; opacity:0.8;">Learn More</div>
      </div>
    </div>
  </div>

</body>
</html>
